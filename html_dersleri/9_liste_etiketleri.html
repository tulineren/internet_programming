<!DOCTYPE html>
<html lang="tr">
    <head>
        <meta charset="UTF-8">
        <title>Liste Etiketleri</title>
    </head>
    <body>
        <ul> <!-- <ul type="disc">, circle, square-->
            <li>Python</li>
            <li>Java</li>
            <li>C++</li>
            <Li>C#</Li>
        </ul>
        <ol> <!-- <ol type="A">, a, i, I -->
            <li>HTML öğren</li>
            <li>CSS öğren</li>
            <li>Javascript öğren</li>
        </ol>
        <ol reversed>
            <li>HTML öğren</li>
            <li>CSS öğren</li>
            <li>Javascript öğren</li>
        </ol>
        <ol start="10">
            <li>HTML öğren</li>
            <li>CSS öğren</li>
            <li>Javascript öğren</li>
        </ol>
        <!-- Liste stillerini CSS ile özelleştirebilir, madde
        işaretlerini değiştirebilir ya da sıralı listelerde
        numaralandırmayı farklı biçimlere çevirebiliriz. -->
        <dl>
            <dt>HTML</dt>
            <dd>Web sayfalarının iskeletini oluşturan dil.</dd>
            <dt>CSS</dt>
            <dd>Web sayfalarına still eklemek için kullanılır.</dd>
        </dl>

    </body>
</html>
