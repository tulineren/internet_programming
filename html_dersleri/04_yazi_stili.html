<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Metin Biçimlendirme Etiketleri</title>
    </head>
    <body>
        <p> <b>Kalın</b> </p>
        <p> <i>İtalik</i></p>
        <p> <u>Altı Çizili</u> </p>
        <p> <strong>Önemli Metin</strong> </p>
        <p> <em>Vurgulu Metin</em> </p>
        <p> <mark>İşaretli Metin</mark> </p>
        <p> <del>Üzeri Çizili</del> </p>
        <p> <code>Kod Satırı</code> </p>
        <p> <small>Küçük</small> </p>
    </body>
</html>
